packages:
  - '.'
overrides:
  # jwks-rsa@4.x depends on jose@^6.1.3 (ESM-only), which breaks the
  # firebase-admin server build (ERR_REQUIRE_ESM). 3.2.2 depends on
  # jose@^4.15.4 (CJS-compatible) and is API-compatible for firebase-admin's
  # narrow usage (fetching Google's JWKS signing keys).
  jwks-rsa: '3.2.2'
allowBuilds:
  '@firebase/util': true
  # core-js's postinstall is just a funding banner — no build needed.
  core-js: false
  protobufjs: true
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
